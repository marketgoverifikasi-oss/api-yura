<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evelyne | Documents</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        'fmn-blue': '#3b82f6',
                        'fmn-dark': '#1e40af',
                        'fmn-purple': '#8b5cf6',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --accent: #3b82f6;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .sidebar {
            transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .api-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .api-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .category-header {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen">

    <!-- SIDEBAR KIRI -->
    <aside id="sidebar" class="sidebar fixed top-0 left-0 h-screen w-72 bg-white border-r border-slate-200 shadow-xl z-50 -translate-x-full lg:translate-x-0">
        <div class="p-6 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-bold text-xl">E</div>
                <div>
                    <h1 class="font-bold text-2xl tracking-tight text-slate-900">Evelyne</h1>
                    <p class="text-xs text-slate-500">API Documentation</p>
                </div>
            </div>
        </div>
        
        <div class="p-6 overflow-y-auto h-[calc(100vh-80px)]" id="sidebar-menu">
            <!-- Categories akan diisi oleh JS -->
        </div>
    </aside>

    <!-- OVERLAY -->
    <div id="overlay" onclick="toggleSidebar()" class="hidden lg:hidden fixed inset-0 bg-black/50 z-40"></div>

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-screen-2xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center text-slate-600 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 text-white rounded-2xl flex items-center justify-center font-bold">E</div>
                    <div>
                        <h1 class="font-semibold text-xl text-slate-900">Evelyne API</h1>
                        <p class="text-xs text-emerald-600 font-medium">Production • Live</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 bg-slate-100 rounded-full px-4 py-1.5 text-sm">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="font-mono text-slate-500 text-xs">v1.0.0</span>
                </div>
                <a href="https://github.com/Renza" target="_blank" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-slate-900 transition-colors">
                    <i class="fa-brands fa-github"></i>
                    <span class="hidden md:inline text-sm font-medium">GitHub</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-6 py-8 lg:pl-80">
        <div class="mb-10">
            <h2 class="text-4xl font-bold text-slate-900 tracking-tight">API Documentation</h2>
            <p class="text-slate-600 mt-2">Complete reference for Evelyne REST API endpoints</p>
        </div>

        <div id="api-container" class="space-y-10"></div>
    </main>

    <script>
        // Data contoh (ganti dengan data asli kamu)
        const apiData = {
            "Authentication": [
                { method: "POST", endpoint: "/auth/login", name: "User Login", params: [] },
                { method: "POST", endpoint: "/auth/register", name: "User Registration", params: [] }
            ],
            "AI": [
                { method: "POST", endpoint: "/ai/generate", name: "Text Generation", params: [{name:"prompt", required:true}] },
                { method: "POST", endpoint: "/ai/chat", name: "AI Chat", params: [] }
            ],
            "User": [
                { method: "GET", endpoint: "/user/profile", name: "Get Profile", params: [] },
                { method: "PUT", endpoint: "/user/update", name: "Update Profile", params: [] }
            ],
            "Payment": [
                { method: "POST", endpoint: "/payment/create", name: "Create Payment", params: [] }
            ]
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-menu');
            let html = '';
            
            Object.keys(apiData).sort().forEach(cat => {
                html += `
                    <a href="#${cat.toLowerCase().replace(/\s+/g,'-')}" 
                       onclick="toggleSidebar()" 
                       class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700 hover:text-blue-600 transition-all group">
                        <i class="fa-solid fa-folder text-blue-500 group-hover:rotate-12 transition-transform"></i>
                        <span class="font-medium">${cat}</span>
                        <span class="ml-auto text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${apiData[cat].length}</span>
                    </a>
                `;
            });
            
            container.innerHTML = html;
        }

        function renderAPI() {
            const container = document.getElementById('api-container');
            container.innerHTML = '';

            Object.keys(apiData).sort().forEach(cat => {
                const catId = cat.toLowerCase().replace(/\s+/g, '-');
                let cardsHTML = '';

                apiData[cat].forEach(route => {
                    const methodColor = route.method === 'GET' ? 'bg-blue-500' : 
                                      route.method === 'POST' ? 'bg-emerald-500' : 'bg-amber-500';
                    
                    cardsHTML += `
                        <div class="api-card bg-white border border-slate-200 rounded-2xl p-6 hover:border-blue-300">
                            <div class="flex items-start justify-between">
                                <div>
                                    <span class="inline-block px-3 py-1 text-xs font-bold text-white \( {methodColor} rounded-lg"> \){route.method}</span>
                                    <code class="ml-3 font-mono text-slate-800">${route.endpoint}</code>
                                </div>
                                <span class="text-xs text-slate-500">${route.name}</span>
                            </div>
                            ${route.params && route.params.length ? `
                            <div class="mt-4 pt-4 border-t text-xs">
                                <div class="text-slate-500 mb-2 font-medium">Parameters</div>
                                ${route.params.map(p => `
                                    <div class="flex justify-between text-slate-600">
                                        <span>${p.name} ${p.required ? '<span class="text-red-500">*</span>' : ''}</span>
                                        <span class="font-mono text-slate-400">string</span>
                                    </div>
                                `).join('')}
                            </div>` : ''}
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div id="${catId}" class="scroll-mt-20">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white">
                                <i class="fa-solid fa-layer-group"></i>
                            </div>
                            <h3 class="text-2xl font-semibold text-slate-900">${cat}</h3>
                            <div class="flex-1 h-px bg-gradient-to-r from-slate-200"></div>
                        </div>
                        <div class="grid md:grid-cols-2 gap-6">
                            ${cardsHTML}
                        </div>
                    </div>
                `;
            });
        }

        // Init
        window.onload = function() {
            renderSidebar();
            renderAPI();
            
            // Auto scroll ke kategori saat klik sidebar
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    if (this.getAttribute('href') !== '#') {
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) target.scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        };
    </script>
</body>
</html>
